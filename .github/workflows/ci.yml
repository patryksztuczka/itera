name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint desktop, web and packages
        run: pnpm turbo run lint --filter=desktop --filter=web --filter='@repo/*'

      - name: Type check desktop, web and packages
        run: pnpm turbo run check-types --filter=desktop --filter=web --filter='@repo/*'
